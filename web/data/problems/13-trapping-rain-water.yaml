slug: trapping-rain-water
title: "[Hard] Trapping Rain Water (LC 42)"
statement_md: |
  Given `n` non-negative integers representing an elevation map where the width
  of each bar is 1, compute how much water it can trap after raining.

  Multiple valid approaches: two pointers (O(n) / O(1)), monotonic stack,
  or precomputed left/right max arrays.

  ## Input
  - One line: space-separated non-negative integer heights (may be empty for n=0).

  ## Output
  - Single integer: total trapped water.

  ## Examples
  Input: `0 1 0 2 1 0 1 3 2 1 2 1`
  Output: `6`

  Input: `4 2 0 3 2 5`
  Output: `9`

  Constraints: `0 ≤ n ≤ 2×10^4`, `0 ≤ height[i] ≤ 10^5`.
languages: ["python", "javascript"]
time_limit_ms: 3000
memory_limit_kb: 262144
testcases:
  - stdin: "0 1 0 2 1 0 1 3 2 1 2 1\n"
    expected_stdout: "6\n"
    is_example: true
  - stdin: "4 2 0 3 2 5\n"
    expected_stdout: "9\n"
  - stdin: "\n"
    expected_stdout: "0\n"
  - stdin: "5\n"
    expected_stdout: "0\n"
  - stdin: "3 0 3\n"
    expected_stdout: "3\n"
  - stdin: "2 0 2\n"
    expected_stdout: "2\n"
  - stdin: "5 4 1 2\n"
    expected_stdout: "1\n"
