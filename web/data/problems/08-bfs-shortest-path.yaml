slug: bfs-shortest-path
title: "Shortest Path in Unweighted Graph (BFS)"
statement_md: |
  An undirected graph is given as edges. Find the shortest distance (number of
  edges) from node `s` to node `t`. Print -1 if no path.

  ## Input
  - Line 1: `n m` (number of nodes, edges)
  - Next m lines: edges `u v`
  - Last line: `s t`

  ## Example
  Input:
  ```
  4 4
  1 2
  2 3
  3 4
  1 4
  1 3
  ```
  Output: `2`
languages: ["python", "javascript"]
time_limit_ms: 3000
testcases:
  - stdin: "4 4\n1 2\n2 3\n3 4\n1 4\n1 3\n"
    expected_stdout: "2\n"
    is_example: true
  - stdin: "5 3\n1 2\n2 3\n3 4\n1 5\n"
    expected_stdout: "-1\n"
  - stdin: "1 0\n1 1\n"
    expected_stdout: "0\n"
