slug: maximum-subarray
title: "[Easy] Maximum Subarray (LC 53)"
statement_md: |
  Given an integer array `nums`, find the contiguous subarray (containing at
  least one number) with the largest sum and return its sum.

  This is the classic **Kadane's algorithm** problem — O(n) one pass.

  ## Input
  - One line: space-separated integers.

  ## Output
  - Single integer: the maximum subarray sum.

  ## Examples
  - `-2 1 -3 4 -1 2 1 -5 4` → `6`  (subarray `[4,-1,2,1]`)
  - `1` → `1`
  - `5 4 -1 7 8` → `23`

  Constraints: `1 ≤ len(nums) ≤ 10^5`, `-10^4 ≤ nums[i] ≤ 10^4`.
languages: ["python", "javascript"]
time_limit_ms: 1500
memory_limit_kb: 262144
testcases:
  - stdin: "-2 1 -3 4 -1 2 1 -5 4\n"
    expected_stdout: "6\n"
    is_example: true
  - stdin: "1\n"
    expected_stdout: "1\n"
  - stdin: "5 4 -1 7 8\n"
    expected_stdout: "23\n"
  - stdin: "-1\n"
    expected_stdout: "-1\n"
  - stdin: "-2 -3 -1 -5\n"
    expected_stdout: "-1\n"
  - stdin: "1 2 3 4 5\n"
    expected_stdout: "15\n"
