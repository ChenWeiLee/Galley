slug: contains-duplicate
title: "[Easy] Contains Duplicate (LC 217)"
statement_md: |
  Given an integer array `nums`, return `true` if any value appears at least
  twice, otherwise return `false`.

  ## Input
  - One line: space-separated integers (may be empty for the empty array).

  ## Output
  - Print `true` or `false`.

  ## Examples
  - `1 2 3 1` → `true`
  - `1 2 3 4` → `false`
  - `1 1 1 3 3 4 3 2 4 2` → `true`
languages: ["python", "javascript"]
time_limit_ms: 1500
memory_limit_kb: 262144
testcases:
  - stdin: "1 2 3 1\n"
    expected_stdout: "true\n"
    is_example: true
  - stdin: "1 2 3 4\n"
    expected_stdout: "false\n"
  - stdin: "1 1 1 3 3 4 3 2 4 2\n"
    expected_stdout: "true\n"
  - stdin: "5\n"
    expected_stdout: "false\n"
  - stdin: "\n"
    expected_stdout: "false\n"
