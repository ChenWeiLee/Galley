slug: fibonacci
title: "Fibonacci Number"
statement_md: |
  Compute the n-th Fibonacci number, where `F(0) = 0`, `F(1) = 1`, and
  `F(n) = F(n-1) + F(n-2)` for n ≥ 2.

  Constraints: 0 ≤ n ≤ 30.

  ## Example
  Input: `5`
  Output: `5`
languages: ["python", "javascript"]
testcases:
  - stdin: "5\n"
    expected_stdout: "5\n"
    is_example: true
  - stdin: "0\n"
    expected_stdout: "0\n"
  - stdin: "1\n"
    expected_stdout: "1\n"
  - stdin: "10\n"
    expected_stdout: "55\n"
  - stdin: "30\n"
    expected_stdout: "832040\n"
