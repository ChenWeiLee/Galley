slug: median-two-sorted
title: "[Hard] Median of Two Sorted Arrays (LC 4)"
statement_md: |
  Given two sorted arrays `nums1` and `nums2`, return the **median** of the
  combined sorted array.

  **Constraint**: the overall runtime should be `O(log(m+n))` — i.e. binary
  search, not merge-then-find.

  ## Input
  - Line 1: space-separated integers for `nums1` (may be empty line for n=0)
  - Line 2: space-separated integers for `nums2` (may be empty line for n=0)

  ## Output
  - The median printed with **exactly one decimal place** (e.g. `2.0`, `2.5`).

  ## Examples
  Input:
  ```
  1 3
  2
  ```
  Output: `2.0`

  Input:
  ```
  1 2
  3 4
  ```
  Output: `2.5`

  Constraints: `0 ≤ m, n ≤ 1000`, `1 ≤ m+n ≤ 2000`.
languages: ["python", "javascript"]
time_limit_ms: 3000
memory_limit_kb: 262144
testcases:
  - stdin: "1 3\n2\n"
    expected_stdout: "2.0\n"
    is_example: true
  - stdin: "1 2\n3 4\n"
    expected_stdout: "2.5\n"
  - stdin: "\n1\n"
    expected_stdout: "1.0\n"
  - stdin: "2\n\n"
    expected_stdout: "2.0\n"
  - stdin: "1 2 3\n4 5 6\n"
    expected_stdout: "3.5\n"
  - stdin: "0 0\n0 0\n"
    expected_stdout: "0.0\n"
