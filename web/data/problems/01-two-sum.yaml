slug: two-sum
title: "[Easy] Two Sum (LC 1)"
statement_md: |
  Given an array of integers `nums` and an integer `target`, return the indices
  of the two numbers such that they add up to `target`.

  Each input has **exactly one** solution. You may not use the same element twice.

  ## Input
  - Line 1: space-separated integers (the array `nums`)
  - Line 2: integer `target`

  ## Output
  - Two indices on one line, space-separated, smaller index first.

  ## Example
  Input:
  ```
  2 7 11 15
  9
  ```
  Output: `0 1`

  Constraints: `2 ≤ len(nums) ≤ 10^4`, `-10^9 ≤ nums[i], target ≤ 10^9`.
languages: ["python", "javascript"]
time_limit_ms: 1500
memory_limit_kb: 262144
testcases:
  - stdin: "2 7 11 15\n9\n"
    expected_stdout: "0 1\n"
    is_example: true
  - stdin: "3 2 4\n6\n"
    expected_stdout: "1 2\n"
  - stdin: "3 3\n6\n"
    expected_stdout: "0 1\n"
  - stdin: "-1 -2 -3 -4 -5\n-8\n"
    expected_stdout: "2 4\n"
  - stdin: "1000000000 -1000000000 0 1\n0\n"
    expected_stdout: "0 1\n"
