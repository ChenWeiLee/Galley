slug: binary-search
title: "Binary Search"
statement_md: |
  Given a sorted array (ascending) of integers and a target, return the index of
  the target, or -1 if not found.

  ## Input
  - Line 1: space-separated integers
  - Line 2: target

  ## Example
  Input:
  ```
  -1 0 3 5 9 12
  9
  ```
  Output: `4`
languages: ["python", "javascript"]
testcases:
  - stdin: "-1 0 3 5 9 12\n9\n"
    expected_stdout: "4\n"
    is_example: true
  - stdin: "-1 0 3 5 9 12\n2\n"
    expected_stdout: "-1\n"
  - stdin: "5\n5\n"
    expected_stdout: "0\n"
  - stdin: "\n3\n"
    expected_stdout: "-1\n"
