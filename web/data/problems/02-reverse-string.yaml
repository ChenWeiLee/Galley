slug: reverse-string
title: "Reverse String"
statement_md: |
  Reverse the input string. The input is a single line.

  ## Example
  Input: `hello`
  Output: `olleh`
languages: ["python", "javascript"]
time_limit_ms: 1000
testcases:
  - stdin: "hello\n"
    expected_stdout: "olleh\n"
    is_example: true
  - stdin: "Racecar\n"
    expected_stdout: "racecaR\n"
  - stdin: "a\n"
    expected_stdout: "a\n"
  - stdin: "\n"
    expected_stdout: "\n"
