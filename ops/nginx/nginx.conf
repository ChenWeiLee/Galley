# interview-judge nginx reverse proxy.
#
# Terminates HTTP (TLS termination is your problem — terminate at your office
# firewall / Tailscale node / wireguard endpoint). This container only handles:
#   - HTTP → Daphne ASGI upstream
#   - WebSocket upgrade for /ws/* paths (live observe, snapshot push)
#   - Static file serving for /static/
#   - Request body cap so a candidate cannot DoS via giant submission

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Trust the request body size we let through. Submissions are source code,
    # 256K is generous; raise if your problem statements include big test data.
    client_max_body_size 256k;
    client_body_timeout  15s;
    keepalive_timeout    65s;

    # WebSocket upgrade map — required by Channels.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream daphne {
        server web:8000;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Block known scanners
        location ~* (\.php|\.asp|\.aspx|/phpmyadmin|/wp-admin) { return 444; }

        # Static files — Daphne can serve them but nginx is faster.
        location /static/ {
            alias /staticfiles/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # WebSocket — must hoist Upgrade/Connection headers, no buffering.
        location /ws/ {
            proxy_pass http://daphne;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;  # idle WS held open for full interview
            proxy_send_timeout 3600s;
        }

        # Everything else → Daphne
        location / {
            proxy_pass http://daphne;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # nginx-level liveness
        location = /nginx-healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
